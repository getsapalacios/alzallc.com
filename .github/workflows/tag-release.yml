name: Tag Release

on:
  push:
    branches:
      - main

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: echo "sprint=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Compute next tag
        id: tag
        run: |
          SPRINT="${{ steps.version.outputs.sprint }}"
          LATEST=$(git tag -l "${SPRINT}-v*" | sort -V | tail -n1)
          if [ -z "$LATEST" ]; then
            N=1
          else
            N=$(echo "$LATEST" | sed "s/${SPRINT}-v//")
            N=$((N + 1))
          fi
          echo "tag=${SPRINT}-v${N}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
